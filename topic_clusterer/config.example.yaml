service_name: "topic-clusterer"
consumer_id: "topic-clusterer"
source_system: "topic-clusterer"
event_version: "v1.0.0"

kafka:
  bootstrap_servers: "kafka:9093"
  input_topic: "preprocessed.messages"
  output_topic: "topic.assignments"
  dlq_topic: "dlq.topic_clustering"
  consumer_group: "topic-clusterer-group"
  client_id: "topic-clusterer"
  max_poll_records: 50
  auto_offset_reset: "earliest"

postgres:
  host: "postgres"
  port: 5432
  database: "telegram_news"
  user: "postgres"
  password: "postgres"
  min_size: 1
  max_size: 5
  command_timeout: 30

schemas:
  preprocessed_message_path: "/app/schemas/preprocessed_message.schema.json"
  topic_assignment_path: "/app/schemas/topic_assignment.schema.json"

model:
  # Compact multilingual backend suitable for CPU fallback or RTX 3050 Laptop.
  # Keep this multilingual for Variant C so OTHER languages still enter topic clustering.
  sbert_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  # cache_dir: "/models/hf-cache"
  device: "auto"
  use_float16: true
  batch_size: 32
  normalize_embeddings: true
  version: "1.0.0"

clustering:
  window_hours: 6
  min_cluster_size: 5
  min_samples: 3
  trigger_min_messages: 1
  n_neighbors: 15
  min_dist: 0.1
  umap_n_components: 50
  fallback_similarity_threshold: 0.68
  scheduler_interval_seconds: 30

storage:
  db_path: "data/topic_clusters.db"
  parquet_dir: "data/parquet"

retry:
  max_attempts: 5
  initial_backoff_seconds: 1.0
  max_backoff_seconds: 30.0
  backoff_multiplier: 2.0

health:
  host: "0.0.0.0"
  port: 8000

metrics:
  host: "0.0.0.0"
  port: 8001

logging:
  level: "INFO"
