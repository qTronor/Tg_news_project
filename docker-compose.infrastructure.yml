version: '3.8'

# Telegram News Pipeline - Complete Infrastructure Stack
# Description: PostgreSQL, Neo4j, Kafka, Redis, and monitoring tools
# Version: 1.0.0

services:
  # =====================================================
  # PostgreSQL - Relational Database
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: telegram-news-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-telegram_news}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Neo4j - Graph Database
  # =====================================================
  neo4j:
    image: neo4j:5.15-community
    container_name: telegram-news-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Neo4j password required}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-2G}
      NEO4J_dbms_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-1G}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # HTTP
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      # NOTE: must be writable, Neo4j entrypoint tries to chown the import dir on startup.
      - ./neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Zookeeper - Kafka Coordination
  # =====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: telegram-news-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_INIT_LIMIT: 10
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Kafka - Message Broker
  # =====================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: telegram-news-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_MESSAGE_MAX_BYTES: 10485760  # 10MB
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Kafka UI - Web Interface for Kafka
  # =====================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: telegram-news-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: telegram-news-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Frontend - Next.js Web Application
  # =====================================================
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${ANALYTICS_PORT:-8020}
        NEXT_PUBLIC_AUTH_BASE_URL: http://localhost:${AUTH_PORT:-8030}
        NEXT_PUBLIC_POLLING_INTERVAL: ${POLLING_INTERVAL:-15000}
    container_name: telegram-news-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Analytics API - PostgreSQL-backed read API for frontend
  # =====================================================
  analytics-api:
    build: ./analytics_api
    container_name: telegram-news-analytics-api
    ports:
      - "${ANALYTICS_PORT:-8020}:8020"
      - "8021:8021"
    environment:
      ANALYTICS_API__POSTGRES__HOST: postgres
      ANALYTICS_API__POSTGRES__PORT: 5432
      ANALYTICS_API__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      ANALYTICS_API__POSTGRES__USER: ${DB_USER:-postgres}
      ANALYTICS_API__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
      ANALYTICS_API__LLM_ENRICHER__URL: "http://llm-enricher:8000"
      ANALYTICS_API__LLM_ENRICHER__ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Auth Service - User Authentication & Authorization
  # =====================================================
  auth-service:
    build: ./auth_service
    container_name: telegram-news-auth
    ports:
      - "${AUTH_PORT:-8030}:8030"
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:?Database password required}@postgres:5432/tg_news_auth
      AUTH_ANALYTICS_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:?Database password required}@postgres:5432/${DB_NAME:-telegram_news}
      AUTH_JWT_SECRET_KEY: ${AUTH_JWT_SECRET:?Auth JWT secret required}
      AUTH_JWT_ALGORITHM: HS256
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      AUTH_REFRESH_TOKEN_EXPIRE_DAYS: 30
      AUTH_CORS_ORIGINS: '["http://localhost:3000"]'
      AUTH_RATE_LIMIT_PER_MINUTE: 30
      AUTH_ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_EMAIL:-}
      AUTH_ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # LLM Enricher - on-demand LLM explainability layer
  # =====================================================
  llm-enricher:
    build:
      context: .
      dockerfile: llm_enricher/Dockerfile
    container_name: telegram-news-llm-enricher
    ports:
      - "8050:8000"
      - "8051:8001"
    environment:
      LLM_ENRICHER__POSTGRES__HOST: postgres
      LLM_ENRICHER__POSTGRES__PORT: 5432
      LLM_ENRICHER__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      LLM_ENRICHER__POSTGRES__USER: ${DB_USER:-postgres}
      LLM_ENRICHER__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
      LLM_ENRICHER__LLM__PROVIDER: ${LLM_PROVIDER:-mistral}
      LLM_ENRICHER__LLM__MODEL_NAME: ${LLM_MODEL:-mistral-large-latest}
      LLM_ENRICHER__BUDGET__DAILY_USD: ${LLM_DAILY_BUDGET_USD:-5.0}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Source Resolver - first source and propagation materialization
  # =====================================================
  source-resolver:
    build: ./source_resolver
    container_name: telegram-news-source-resolver
    ports:
      - "8040:8040"
      - "8041:8041"
    environment:
      SOURCE_RESOLVER__POSTGRES__HOST: postgres
      SOURCE_RESOLVER__POSTGRES__PORT: 5432
      SOURCE_RESOLVER__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      SOURCE_RESOLVER__POSTGRES__USER: ${DB_USER:-postgres}
      SOURCE_RESOLVER__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Analysis pipeline
  # =====================================================
  sentiment-analyzer:
    build:
      context: .
      dockerfile: sentiment_analyzer/Dockerfile
    container_name: telegram-news-sentiment-analyzer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8012:8000"
      - "8013:8001"
    environment:
      SENTIMENT_ANALYZER__KAFKA__BOOTSTRAP_SERVERS: kafka:9093
      SENTIMENT_ANALYZER__POSTGRES__HOST: postgres
      SENTIMENT_ANALYZER__POSTGRES__PORT: 5432
      SENTIMENT_ANALYZER__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      SENTIMENT_ANALYZER__POSTGRES__USER: ${DB_USER:-postgres}
      SENTIMENT_ANALYZER__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
      SENTIMENT_ANALYZER__MODEL__DEVICE: ${MODEL_DEVICE:-auto}
    volumes:
      - sentiment_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - telegram-news-network

  ner-extractor:
    build:
      context: .
      dockerfile: ner_extractor/Dockerfile
    container_name: telegram-news-ner-extractor
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8014:8000"
      - "8015:8001"
    environment:
      NER_EXTRACTOR__KAFKA__BOOTSTRAP_SERVERS: kafka:9093
      NER_EXTRACTOR__POSTGRES__HOST: postgres
      NER_EXTRACTOR__POSTGRES__PORT: 5432
      NER_EXTRACTOR__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      NER_EXTRACTOR__POSTGRES__USER: ${DB_USER:-postgres}
      NER_EXTRACTOR__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - telegram-news-network

  topic-clusterer:
    build:
      context: .
      dockerfile: topic_clusterer/Dockerfile
    container_name: telegram-news-topic-clusterer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8032:8000"
      - "8033:8001"
    environment:
      TOPIC_CLUSTERER__KAFKA__BOOTSTRAP_SERVERS: kafka:9093
      TOPIC_CLUSTERER__POSTGRES__HOST: postgres
      TOPIC_CLUSTERER__POSTGRES__PORT: 5432
      TOPIC_CLUSTERER__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      TOPIC_CLUSTERER__POSTGRES__USER: ${DB_USER:-postgres}
      TOPIC_CLUSTERER__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
      TOPIC_CLUSTERER__MODEL__DEVICE: ${MODEL_DEVICE:-auto}
    volumes:
      - topic_clusterer_data:/app/data
      - topic_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Telegram collector and raw persistence
  # =====================================================
  telegram-collector:
    build: ./rbc_telegram_collector
    container_name: telegram-news-collector
    command: ["service", "--config", "config.yaml"]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      TG_API_ID: ${TG_API_ID:?Telegram API ID required}
      TG_API_HASH: ${TG_API_HASH:?Telegram API hash required}
      TG_STRING_SESSION: ${TG_STRING_SESSION:?Telegram string session required}
      TG_PROXY_ENABLED: ${TG_PROXY_ENABLED:-false}
      TG_PROXY_SCHEME: ${TG_PROXY_SCHEME:-socks5}
      TG_PROXY_HOST: ${TG_PROXY_HOST:-}
      TG_PROXY_PORT: ${TG_PROXY_PORT:-}
      TG_PROXY_USERNAME: ${TG_PROXY_USERNAME:-}
      TG_PROXY_PASSWORD: ${TG_PROXY_PASSWORD:-}
      TG_PROXY_RDNS: ${TG_PROXY_RDNS:-true}
      COLLECTOR_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      COLLECTOR_ANALYTICS_DB_HOST: postgres
      COLLECTOR_ANALYTICS_DB_PORT: 5432
      COLLECTOR_ANALYTICS_DB_NAME: ${DB_NAME:-telegram_news}
      COLLECTOR_ANALYTICS_DB_USER: ${DB_USER:-postgres}
      COLLECTOR_ANALYTICS_DB_PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - ./rbc_telegram_collector/config.yaml:/app/config.yaml:ro
      - ./rbc_telegram_collector/data:/app/data
      - ./rbc_telegram_collector/state:/app/state
    restart: unless-stopped
    networks:
      - telegram-news-network

  message-persister:
    build:
      context: .
      dockerfile: message_persister/Dockerfile
    container_name: telegram-news-message-persister
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      MESSAGE_PERSISTER__KAFKA__BOOTSTRAP_SERVERS: kafka:9093
      MESSAGE_PERSISTER__POSTGRES__HOST: postgres
      MESSAGE_PERSISTER__POSTGRES__PORT: 5432
      MESSAGE_PERSISTER__POSTGRES__DATABASE: ${DB_NAME:-telegram_news}
      MESSAGE_PERSISTER__POSTGRES__USER: ${DB_USER:-postgres}
      MESSAGE_PERSISTER__POSTGRES__PASSWORD: ${DB_PASSWORD:?Database password required}
    volumes:
      - ./message_persister/config.yaml:/app/message_persister/config.yaml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    command: ["python", "/app/message_persister/main.py", "--config", "/app/message_persister/config.yaml"]
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Redis - Caching & Deduplication
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: telegram-news-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram-news-network

  # =====================================================
  # Prometheus - Metrics Collection (Optional)
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: telegram-news-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram-news-network
    profiles:
      - monitoring

  # =====================================================
  # Grafana - Visualization (Optional)
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: telegram-news-grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - telegram-news-network
    profiles:
      - monitoring

# =====================================================
# Volumes
# =====================================================
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  redis_data:
    driver: local
  sentiment_model_cache:
    driver: local
  topic_clusterer_data:
    driver: local
  topic_model_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =====================================================
# Networks
# =====================================================
networks:
  telegram-news-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
