# Standalone dev-only compose (for running auth-service without the full stack).
# In production, use the root docker-compose.infrastructure.yml instead —
# auth-service is defined there and shares the main PostgreSQL instance.

services:
  auth-service:
    build: .
    ports:
      - "${AUTH_PORT:-8030}:8030"
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@host.docker.internal:5432/tg_news_auth
      AUTH_JWT_SECRET_KEY: ${AUTH_JWT_SECRET:-dev-only-secret-change-in-prod}
      AUTH_CORS_ORIGINS: '["http://localhost:3000"]'
      AUTH_ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_EMAIL:-admin@tgnews.local}
      AUTH_ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
