service_name: "ner-extractor"
consumer_id: "ner-extractor"
source_system: "ner-extractor"
event_version: "v1.0.0"

kafka:
  bootstrap_servers: "kafka:9093"
  input_topic: "preprocessed.messages"
  output_topic: "ner.enriched"
  dlq_topic: "dlq.ner"
  consumer_group: "ner-extractor-group"
  client_id: "ner-extractor"
  max_poll_records: 50
  auto_offset_reset: "earliest"

postgres:
  host: "postgres"
  port: 5432
  database: "telegram_news"
  user: "postgres"
  password: "postgres"
  min_size: 1
  max_size: 5
  command_timeout: 30

schemas:
  preprocessed_message_path: "/app/schemas/preprocessed_message.schema.json"
  ner_enriched_path: "/app/schemas/ner_enriched.schema.json"

model:
  confidence: 0.8
  min_entity_length: 3
  version: "1.0.0"

retry:
  max_attempts: 5
  initial_backoff_seconds: 1.0
  max_backoff_seconds: 30.0
  backoff_multiplier: 2.0

health:
  host: "0.0.0.0"
  port: 8000

metrics:
  host: "0.0.0.0"
  port: 8001

logging:
  level: "INFO"
