version: '3.8'

services:
  ner-extractor:
    build:
      context: ..
      dockerfile: ner_extractor/Dockerfile
    container_name: ner-extractor
    environment:
      NER_EXTRACTOR__KAFKA__BOOTSTRAP_SERVERS: "kafka:9093"
      NER_EXTRACTOR__POSTGRES__HOST: "postgres"
      NER_EXTRACTOR__POSTGRES__PORT: "5432"
      NER_EXTRACTOR__POSTGRES__DATABASE: "${DB_NAME:-telegram_news}"
      NER_EXTRACTOR__POSTGRES__USER: "${DB_USER:-postgres}"
      NER_EXTRACTOR__POSTGRES__PASSWORD: "${DB_PASSWORD}"
    ports:
      - "8014:8000"
      - "8015:8001"
    restart: unless-stopped
    networks:
      - telegram-news-network

networks:
  telegram-news-network:
    external: true
    name: telegram-news-network
