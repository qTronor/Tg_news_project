# Example microservice configuration with Kafka delivery

channels:
  - name: "rbc_news"
    url: "https://t.me/rbc_news"
    enabled: true
    limit: 2500

  - name: "banksta"
    url: "https://t.me/banksta"
    enabled: true
    limit: 2500

collection:
  lookback_days: 3

kafka:
  enabled: true
  topic: "raw.telegram.messages"

scheduler:
  enabled: true
  interval_seconds: 3600

api:
  enabled: true
  host: "0.0.0.0"
  port: 8000

output:
  data_dir: "data"
  state_dir: "state"
  formats: ["jsonl"]

logging:
  level: "INFO"
