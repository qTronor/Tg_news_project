# Telegram channels to collect
channels:
  - name: "rbc_news"
    url: "https://t.me/rbc_news"
    enabled: true
    limit: 2500

  - name: "banksta"
    url: "https://t.me/banksta"
    enabled: true
    limit: 2500

collection:
  lookback_days: 3

analytics_db:
  enabled: true

kafka:
  enabled: true
  topic: "raw.telegram.messages"

backfill:
  enabled: true
  global_concurrency: 1
  max_jobs_per_cycle: 1
  max_attempts: 3
  retry_backoff_seconds: 60

output:
  data_dir: "data"
  state_dir: "state"
  formats: ["jsonl"]

scheduler:
  enabled: true
  interval_seconds: 60

logging:
  level: "INFO"
