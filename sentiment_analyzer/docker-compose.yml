version: '3.8'

services:
  sentiment-analyzer:
    build:
      context: ..
      dockerfile: sentiment_analyzer/Dockerfile
    container_name: sentiment-analyzer
    environment:
      SENTIMENT_ANALYZER__KAFKA__BOOTSTRAP_SERVERS: "kafka:9093"
      SENTIMENT_ANALYZER__POSTGRES__HOST: "postgres"
      SENTIMENT_ANALYZER__POSTGRES__PORT: "5432"
      SENTIMENT_ANALYZER__POSTGRES__DATABASE: "${DB_NAME:-telegram_news}"
      SENTIMENT_ANALYZER__POSTGRES__USER: "${DB_USER:-postgres}"
      SENTIMENT_ANALYZER__POSTGRES__PASSWORD: "${DB_PASSWORD}"
      SENTIMENT_ANALYZER__MODEL__DEVICE: "${MODEL_DEVICE:-auto}"
    volumes:
      - sentiment-model-cache:/root/.cache/huggingface
    ports:
      - "8012:8000"
      - "8013:8001"
    restart: unless-stopped
    networks:
      - telegram-news-network

volumes:
  sentiment-model-cache:

networks:
  telegram-news-network:
    external: true
    name: tg_news_project_telegram-news-network

