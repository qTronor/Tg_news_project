service_name: "sentiment-analyzer"
consumer_id: "sentiment-analyzer"
source_system: "sentiment-analyzer"
event_version: "v1.0.0"

kafka:
  bootstrap_servers: "kafka:9093"
  input_topic: "preprocessed.messages"
  output_topic: "sentiment.enriched"
  dlq_topic: "dlq.sentiment"
  consumer_group: "sentiment-analyzer-group"
  client_id: "sentiment-analyzer"
  max_poll_records: 50
  auto_offset_reset: "earliest"

postgres:
  host: "postgres"
  port: 5432
  database: "telegram_news"
  user: "postgres"
  password: "postgres"
  min_size: 1
  max_size: 5
  command_timeout: 30

schemas:
  preprocessed_message_path: "/app/schemas/preprocessed_message.schema.json"
  sentiment_enriched_path: "/app/schemas/sentiment_enriched.schema.json"

models:
  # Russian sentiment: compact rubert-tiny (fast, good quality for RU)
  ru:
    name: "cointegrated/rubert-tiny-sentiment-balanced"
    # local_path: "/app/models/ru_sentiment"
    cache_dir: "/models/hf-cache"
    device: "auto"
    use_float16: true
    batch_size: 32
    max_length: 384
    chunk_overlap: 64
    neutral_threshold: 0.55
    version: "1.0.0"

  # EN + other supported languages: multilingual XLM-RoBERTa
  multilingual:
    name: "cardiffnlp/twitter-xlm-roberta-base-sentiment"
    cache_dir: "/models/hf-cache"
    device: "auto"
    use_float16: true
    batch_size: 16
    max_length: 512
    chunk_overlap: 64
    neutral_threshold: 0.50
    version: "1.0.0"

  # RU emotion model: CEDR-tiny (joy/sadness/surprise/fear/anger)
  emotion_ru:
    name: "cointegrated/rubert-tiny2-cedr-emotion-detection"
    cache_dir: "/models/hf-cache"
    device: "auto"
    use_float16: true
    batch_size: 32
    max_length: 128
    version: "1.0.0"
    enabled: true

  # EN emotion model: distilroberta (+ disgust label)
  emotion_en:
    name: "j-hartmann/emotion-english-distilroberta-base"
    cache_dir: "/models/hf-cache"
    device: "auto"
    use_float16: true
    batch_size: 16
    max_length: 128
    version: "1.0.0"
    enabled: true

retry:
  max_attempts: 5
  initial_backoff_seconds: 1.0
  max_backoff_seconds: 30.0
  backoff_multiplier: 2.0

health:
  host: "0.0.0.0"
  port: 8000

metrics:
  host: "0.0.0.0"
  port: 8001

logging:
  level: "INFO"
